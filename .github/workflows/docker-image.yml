name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runner_version:
        description: GitHub Actions runner version to install
        required: false
        default: 2.335.1
      servercore_version:
        description: Windows Server Core tag to use
        required: false
        default: ltsc2025

permissions:
  contents: read

concurrency:
  group: docker-windows-github-runner-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_SHA_TAG: registry.meza.gg/docker-windows-github-runner:${{ github.sha }}
  IMAGE_LATEST_TAG: registry.meza.gg/docker-windows-github-runner:latest
  RUNNER_VERSION: ${{ inputs.runner_version || '2.335.1' }}
  SERVERCORE_VERSION: ${{ inputs.servercore_version || 'ltsc2025' }}

jobs:
  build-and-push:
    name: Build and push Windows runner image
    runs-on:
      - self-hosted
      - windows-docker

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: registry.meza.gg
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image
        shell: pwsh
        run: |
          docker build `
            --build-arg SERVERCORE_VERSION="$env:SERVERCORE_VERSION" `
            --build-arg RUNNER_VERSION="$env:RUNNER_VERSION" `
            --tag "$env:IMAGE_SHA_TAG" `
            --tag "$env:IMAGE_LATEST_TAG" `
            .

      - name: Push image
        shell: pwsh
        run: |
          docker push "$env:IMAGE_SHA_TAG"
          docker push "$env:IMAGE_LATEST_TAG"
