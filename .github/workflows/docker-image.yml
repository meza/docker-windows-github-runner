name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runner_version:
        description: GitHub Actions runner version to install
        required: false
        default: 2.335.1
      servercore_version:
        description: Windows Server Core tag to use
        required: false
        default: ltsc2025

permissions:
  contents: read

concurrency:
  group: docker-windows-github-runner-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: registry.meza.gg/docker-windows-github-runner
  RUNNER_VERSION: ${{ inputs.runner_version || '2.335.1' }}
  SERVERCORE_VERSION: ${{ inputs.servercore_version || 'ltsc2025' }}

jobs:
  build-and-push:
    name: Build and push Windows runner image
    runs-on:
      - self-hosted
      - windows-docker

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: registry.meza.gg
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            SERVERCORE_VERSION=${{ env.SERVERCORE_VERSION }}
            RUNNER_VERSION=${{ env.RUNNER_VERSION }}
